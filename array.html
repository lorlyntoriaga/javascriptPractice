<html>

<head>
    <title> Array </title>
    <script>
        var arr = new Array(2, 3.1, "Hello")
        document.write(arr + "<br/>")
        document.write(arr.length + "<br/>")
        document.write(arr[0] + "<br/>")
        document.write(arr[0] + " " + arr[2] + " " + arr[1] + "<br/> <br/>")

        var b = [2, 3.1, "Hello"]
        document.write("Array B"+ b + "<br/> <br/>")

        var c = Array()
        c[0] = "31";
        c[1] = "Good Morning"
        c[2] = "0.12"

        document.write("Array c: " + c)
        document.write(c[2] + "<br/>")
    </script>
</head>

<body>


</body>

</html>
