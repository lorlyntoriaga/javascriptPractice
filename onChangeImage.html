<html>
  <head>
    <title>onchange</title>
    <script>
      function onchangeHandleEvent(x) {
        document.body.style.backgroundImage = "url('"+x+"')";
      }
    </script>
  </head>

  <body>
    <select onchange="onchangeHandleEvent(this.value)">
    // make the "\" directory divider in to "/" to locate the image
      <option value="">Select an Image</option>
      <option value="Images/otter.jpg">Otter</option>
      <option value="Images/squirrel.jpg">Squirrel</option>
      <option value="Images/racoon.jpg">Racoon</option>
    </select>
  </body>
</html>
