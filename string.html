<html>
  <head>
    <title>String</title>
    <script>
        var s = "Hello World";
        document.write("Lenght: " + s.length + "<br/>")
        document.write("Index of o is: " + s.indexOf("o") + "<br/>")
        document.write("Last Index of o is: " + s.lastIndexOf("o") + "<br/>")
        document.write("tolowercase: " + s.toLowerCase() + "<br/>")
        document.write("toUppercase: " + s.toUpperCase() + "<br/>")
        document.write("Display in Bold: " + s.bold() + "<br/>")
        document.write("Replace: " + s.replace("Hello", "Team") + "<br/>")
        document.write("Replace: " + s.replace("H", "B"))


    </script>
  </head>

  <body></body>
</html>
