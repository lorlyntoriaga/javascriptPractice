<!doctype html>
<html lang="en">
  <head>
    <title>Assignment</title>
    <script>
      let num = parseInt(prompt("Enter a number:"));

      for (i = 1; i <= num; i++) {
        if (i % 3 == 0) {
          continue;
        }
        document.write("" +i + "<br>");
      }
    </script>
  </head>
  <body></body>
</html>
