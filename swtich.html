<!DOCTYPE html>
<html lang="en">
<head>
    <title> Switch using String</title>
    <script>
        var n = prompt("Enter any name","john, mirla, karen");

        switch(n){
            case "john":
                document.write("John");
                if (n == "john"){
                    document.write("Hello John");
                }
                break;
            case "mirla": 
                document.write("Mirla");
                break;
            case "karen": 
                document.write("Karen");
                break;
            default:
                document.write("No Match");
        }
    </script>
</head>
<body>

</body>
</html>
