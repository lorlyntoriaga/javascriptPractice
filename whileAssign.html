<!doctype html>
<html lang="en">
  <head>
    <title>Assignment</title>
    <script>
      let num = parseInt(prompt("Enter a number:"));
      let i = 1;

      while (i <= num) {
        if (i %3 == 0) {
            i++;
            continue;
        }
        document.write(i + "<br>")
        i++;
      }
    </script>
  </head>
  <body></body>
</html>
